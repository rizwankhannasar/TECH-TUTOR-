<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Quiz | TechTutor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quiz.css">
</head>
<body class="quiz-page">
    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">TechTutor</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="index.html#technologies">Courses</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="dashboard.html" class="nav-btn">Dashboard</a></li>
        </ul>
    </nav>

    <main class="quiz-container">
        <a href="#" id="backBtn" class="back-btn">← Back to Course</a>
        <h1 id="quizTitle">Course Quiz</h1>
        <p class="quiz-info">Answer all 10 questions. You need 60% or more to pass.</p>

        <div id="quizBox">
            <form id="quizForm">
                <div id="questionsContainer"></div>
                <button type="submit" class="btn-primary btn-submit">Submit Quiz</button>
            </form>
        </div>

        <div id="resultBox" class="result-box hidden">
            <h2 id="resultTitle">Quiz Result</h2>
            <p class="score-text">You scored <strong id="scoreCount">0</strong> out of <strong id="totalCount">10</strong></p>
            <p id="passFail" class="pass-fail"></p>
            <div class="result-actions">
                <a href="#" id="backToCourseBtn" class="btn-primary">Back to Course</a>
                <a href="dashboard.html" class="btn-secondary">Go to Dashboard</a>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5000';
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('courseId');
        const courseTitle = urlParams.get('title') || 'Course';

        const backBtn = document.getElementById('backBtn');
        const backToCourseBtn = document.getElementById('backToCourseBtn');
        backBtn.href = `course-view.html?courseId=${courseId}`;
        backToCourseBtn.href = `course-view.html?courseId=${courseId}`;

        document.getElementById('quizTitle').textContent = courseTitle + ' – Quiz';

        if (!courseId) {
            document.getElementById('quizBox').innerHTML = '<p class="error-msg">No course selected. <a href="dashboard.html">Go to Dashboard</a></p>';
        } else {
            loadQuiz();
        }

        async function loadQuiz() {
            try {
                const res = await fetch(`${API_BASE}/api/courses/${courseId}/quiz`);
                if (!res.ok) throw new Error('Could not load quiz');
                const questions = await res.json();
                if (!Array.isArray(questions) || questions.length === 0) {
                    document.getElementById('quizBox').innerHTML = '<p class="error-msg">No quiz available for this course yet.</p>';
                    return;
                }
                renderQuestions(questions);
            } catch (e) {
                document.getElementById('quizBox').innerHTML = '<p class="error-msg">Failed to load quiz. Make sure the server is running and you have run the quiz SQL.</p>';
            }
        }

        function renderQuestions(questions) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questions.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = 'question-block';
                div.innerHTML = `
                    <p class="question-number">Question ${i + 1} of ${questions.length}</p>
                    <p class="question-text">${escapeHtml(q.question_text)}</p>
                    <label class="option"><input type="radio" name="q${q.id}" value="A" required> ${escapeHtml(q.option_a)}</label>
                    <label class="option"><input type="radio" name="q${q.id}" value="B"> ${escapeHtml(q.option_b)}</label>
                    <label class="option"><input type="radio" name="q${q.id}" value="C"> ${escapeHtml(q.option_c)}</label>
                    <label class="option"><input type="radio" name="q${q.id}" value="D"> ${escapeHtml(q.option_d)}</label>
                `;
                div.dataset.correct = q.correct_option;
                div.dataset.questionId = q.id;
                container.appendChild(div);
            });
        }

        function escapeHtml(s) {
            if (s == null) return '';
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        document.getElementById('quizForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const blocks = document.querySelectorAll('.question-block');
            let correct = 0;
            blocks.forEach(block => {
                const name = 'q' + block.dataset.questionId;
                const selected = document.querySelector(`input[name="${name}"]:checked`);
                if (selected && selected.value === block.dataset.correct) correct++;
            });
            const total = blocks.length;
            const percent = total ? Math.round((correct / total) * 100) : 0;
            const passed = percent >= 60;

            document.getElementById('quizBox').classList.add('hidden');
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('scoreCount').textContent = correct;
            document.getElementById('totalCount').textContent = total;
            const passEl = document.getElementById('passFail');
            passEl.textContent = percent + '% – ' + (passed ? 'Passed!' : 'Keep studying and try again.');
            passEl.className = 'pass-fail ' + (passed ? 'passed' : 'failed');
        });
    </script>
</body>
</html>
