 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TechTutor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">TechTutor</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="index.html#technologies">Courses</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="login.html" class="nav-btn">Login</a></li>
        </ul>
    </nav>
    <div class="auth-container">
        <h2>Create Account</h2>
        <form id="registerForm">
            <div class="input-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" name="name" required placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" name="email" required placeholder="Enter email">
            </div>

            <div class="input-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" name="password" required minlength="6" placeholder="Create password (min 6 characters)">
            </div>

            <button type="submit" class="btn-primary">Sign Up</button>
        </form>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script src="js/api.js"></script>
</body>
</html>
