 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechTutor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">TechTutor</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="index.html#technologies">Courses</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="register.html" class="nav-btn">Register</a></li>
        </ul>
    </nav>
    <div class="auth-container">
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn-primary">Login</button>
        </form>
        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <script src="js/api.js"></script>
</body>
</html>
